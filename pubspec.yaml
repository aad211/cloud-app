name: cloud_app
description: "CLOUD App - Cough Lung Observation & Diagnosis"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  record: ^7.0.0
  fftea: ^1.5.0
  path_provider: ^2.1.5
  tflite_flutter: ^0.12.1
  web: ^1.1.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.3.0
  geolocator: ^14.0.2
  http: ^1.6.0
  audioplayers: ^6.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/cloud.tflite
    - assets/labels.txt
    - assets/images/cloud_logo_icon.svg
