name: cloud_app
description: "CLOUD App - Cough Lung Observation & Diagnosis"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  record: ^6.0.0
  fftea: ^1.5.0
  path_provider: ^2.1.5
  tflite_flutter: ^0.11.0
  web: ^1.1.0
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.1
  geolocator: ^13.0.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/cloud.tflite
    - assets/labels.txt
    - assets/images/cloud_logo_icon.svg
